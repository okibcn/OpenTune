name: Debug Build

concurrency: 
  group: "build"
  cancel-in-progress: true

on:
  push:
    paths-ignore:
      - '*.md'
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Debug session enabled'
        required: false
        default: false
        type: boolean
    paths-ignore:
      - '*.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: false
      
      - name: Update submodules
        run: git submodule update --init --recursive
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Check if keystore secret exists
        id: check_secret
        env:
          KEYSTORE_SECRET: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_SECRET" ]; then
            echo "exists=false" >> $GITHUB_OUTPUT
          else
            echo "exists=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Generate debug keystore
        if: steps.check_secret.outputs.exists == 'false'
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "C=US, O=Android, CN=Android Debug"
          base64 debug.keystore > debug.keystore.base64
          echo "NO DEBUG KEY FOUND!!!"
          echo "Use this one with name DEBUG_KEYSTORE_BASE64 in the repo Settings > Secrets and variables > Actions"
          cat debug.keystore.base64
      
      - name: Decode debug keystore AND Move it to expected location and name
        if: steps.check_secret.outputs.exists == 'true'
        run: |
          mkdir -p ~/work/_temp/keystore/
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > ~/work/_temp/keystore/prerelease.keystore
      
      - name: Setup signing env vars
        if: steps.check_secret.outputs.exists == 'true'
        run: |
          echo "SIGNING_STORE_PASSWORD=android" >> $GITHUB_ENV
          echo "SIGNING_KEY_PASSWORD=android" >> $GITHUB_ENV
          echo "SIGNING_KEY_ALIAS=androiddebugkey" >> $GITHUB_ENV

      - name: "🔧 Prepare debug session"
        if: github.event.inputs.debug_enabled == 'true'
        run: |
          sudo apt install zsh zsh-syntax-highlighting
          sudo wget https://github.com/JanDeDobbeleer/oh-my-posh/releases/latest/download/posh-linux-amd64 -O /usr/local/bin/oh-my-posh
          sudo chmod +x /usr/local/bin/oh-my-posh
          wget -q https://github.com/okibcn/miniU/raw/main/Github_Linux/.nanorc -O ~/.nanorc
          wget -q https://github.com/okibcn/miniU/raw/main/Github_Linux/profile.sh -O ~/.zshrc
          cp /etc/bash.bashrc ~
          cat ~/.zshrc >> ~/bash.bashrc
          sudo chsh -s $(which zsh)
          echo "set-option -g default-shell $(which zsh)" >> ~/.tmate.conf
          cat ~/bash.bashrc >> ~/.tmate.conf
          export SHELL=$(which zsh)

      - name: "🐞 Debug session"
        uses: mxschmitt/action-tmate@v3
        if: github.event.inputs.debug_enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # - name: Force debug signingConfig
      #   if: steps.check_secret.outputs.exists == 'true'
      #   run: |
      #     sed -i 's/debug {/debug {\n                signingConfig = signingConfigs.getByName("prerelease")\n /' app/build.gradle.kts
      
      - name: Build Debug APK
        run: ./gradlew assembleDebug
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.ref_name }}-run${{ github.run_number }}
          path: "app/build/outputs/apk/debug/*.apk"
          retention-days: 7

